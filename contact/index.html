---
layout: default
title: Contacto
description: Contacto Marcel Reig Desarrollador Web Menorca
---

<section class="bg-contact">
  {% include page-title.html %}
  <div class="container">
    <div class="row justify-content-center">
      <!-- Información de contacto -->
      <div class="col-lg-6 col-md-8">
        <div class="contact-info-card">
          <div class="contact_details">
            <div class="about">
              <h4>Contacto</h4>
              <hr />
              <p>Puedes contactarme por email o a través de cualquiera de mis redes.</p>
            </div>
            <div class="info">
              <h4 class="color-blue-light">
                <i class="fas fa-map-marker-alt"></i> Localización
              </h4>
              <p>Alaior, Menorca</p>
              <h4 class="color-blue-light">
                <i class="far fa-envelope"></i> Email
              </h4>
              <p>marcelreig@gmail.com</p>
            </div>
          </div>
          <ul class="social-links mt-4">
            <li class="social__item">
              <a href="{{ site.linkedin_path }}" target="_blank"><i class="fab fa-linkedin"></i></a>
            </li>
            <li class="social__item">
              <a href="{{ site.github_path }}" target="_blank"><i class="fab fa-github"></i></a>
            </li>
<li class="social__item">
              <a href="{{ site.twitter_path }}" target="_blank"><i class="fab fa-twitter"></i></a>
            </li>
            <li class="social__item">
              <a href="{{ site.instagram_path }}" target="_blank"><i class="fab fa-instagram"></i></a>
            </li>
          </ul>
        </div>
      </div>
      
      <!-- Formulario de contacto -->
      <div class="col-lg-6 col-md-8 mt-4 mt-lg-0">
        <div class="contact-form">
          <h4>Escríbeme</h4>
          <hr />
          <form name="contact" method="POST" data-netlify="true">
            <div class="form-group mb-3">
              <label for="name">Nombre</label>
              <input type="text" class="form-control" name="name" id="name" placeholder="Nombre" />
            </div>
            <div class="form-group mb-3">
              <label for="email">Email</label>
              <input type="email" name="email" id="email" class="form-control" placeholder="Email" />
            </div>
            <div class="form-group mb-3">
              <label for="message">Mensaje</label>
              <textarea name="message" id="message" placeholder="Mensaje" class="form-control" rows="4"></textarea>
            </div>
            <div class="form-group">
              <button type="submit" class="btn btn-outline-light">
                Enviar
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
